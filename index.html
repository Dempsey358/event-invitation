<!DOCTYPE html>
<html lang="ja" data-theme="farewell">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Invitation</title>
  <meta name="description" content="イベントへのご招待">
  <meta property="og:title" content="イベントへのご招待">
  <meta property="og:description" content="あなたをイベントにご招待します">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Particles Container -->
  <div id="particles" class="particles" aria-hidden="true"></div>

  <!-- ===== Section 1: Envelope ===== -->
  <section id="envelope-section" class="section envelope-section">
    <div class="envelope-container" id="envelope">
      <div class="envelope-flap" id="envelope-flap"></div>
      <div class="envelope-body">
        <div class="envelope-letter" id="envelope-letter">
          <span class="letter-icon">✉</span>
          <span class="letter-text">あなたへのご招待</span>
        </div>
      </div>
      <p class="envelope-hint">タップして開封</p>
    </div>
  </section>

  <!-- ===== Section 2: Event Details ===== -->
  <section id="details-section" class="section details-section hidden">
    <div class="card details-card animate-in">
      <div class="card-decoration" aria-hidden="true"></div>
      <h1 class="event-title" id="event-title"></h1>
      <p class="event-subtitle" id="event-subtitle"></p>
      <div class="event-message" id="event-message"></div>
      <div class="details-grid">
        <div class="detail-item">
          <span class="detail-icon">📅</span>
          <span class="detail-label">日時</span>
          <span class="detail-value" id="detail-date"></span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">📍</span>
          <span class="detail-label">場所</span>
          <span class="detail-value" id="detail-venue"></span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">💰</span>
          <span class="detail-label">会費</span>
          <span class="detail-value" id="detail-fee"></span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">🎉</span>
          <span class="detail-label">主賓</span>
          <span class="detail-value" id="detail-guest"></span>
        </div>
        <div class="detail-item">
          <span class="detail-icon">👤</span>
          <span class="detail-label">幹事</span>
          <span class="detail-value" id="detail-organizer"></span>
        </div>
        <div class="detail-item" id="detail-map-container" style="display:none">
          <span class="detail-icon">🗺️</span>
          <span class="detail-label">地図</span>
          <a class="detail-value detail-link" id="detail-map" href="#" target="_blank" rel="noopener">Google Mapsで開く</a>
        </div>
      </div>
      <a class="btn-calendar" id="btn-calendar" href="#" target="_blank" rel="noopener">
        <span class="btn-calendar-icon">📅</span>
        <span>Googleカレンダーに追加</span>
      </a>
      <div class="scroll-hint">
        <span>下にスクロール</span>
        <div class="scroll-arrow">▼</div>
      </div>
    </div>
  </section>

  <!-- ===== Section 3: Countdown ===== -->
  <section id="countdown-section" class="section countdown-section hidden">
    <div class="card countdown-card animate-in">
      <h2 class="section-title">開催まであと</h2>
      <div class="countdown-grid" id="countdown">
        <div class="countdown-item">
          <span class="countdown-number" id="cd-days">00</span>
          <span class="countdown-label">日</span>
        </div>
        <div class="countdown-separator">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-hours">00</span>
          <span class="countdown-label">時間</span>
        </div>
        <div class="countdown-separator">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-minutes">00</span>
          <span class="countdown-label">分</span>
        </div>
        <div class="countdown-separator">:</div>
        <div class="countdown-item">
          <span class="countdown-number" id="cd-seconds">00</span>
          <span class="countdown-label">秒</span>
        </div>
      </div>
      <div class="countdown-past hidden" id="countdown-past">
        <p class="past-message">🎉 イベントは終了しました！</p>
      </div>
    </div>
  </section>

  <!-- ===== Section 4: RSVP ===== -->
  <section id="rsvp-section" class="section rsvp-section hidden">
    <div class="card rsvp-card animate-in">
      <h2 class="section-title">出欠回答</h2>
      <p class="rsvp-deadline" id="rsvp-deadline"></p>
      <p class="rsvp-notes" id="rsvp-notes"></p>
      <form id="rsvp-form" class="rsvp-form">
        <div class="form-group">
          <label for="rsvp-name">お名前 <span class="required">*</span></label>
          <input type="text" id="rsvp-name" name="name" required placeholder="例：山田太郎">
        </div>
        <div class="form-group">
          <label>出欠 <span class="required">*</span></label>
          <div class="radio-group">
            <label class="radio-label attend">
              <input type="radio" name="attendance" value="参加" required>
              <span class="radio-custom"></span>
              <span class="radio-text">🎉 参加する</span>
            </label>
            <label class="radio-label decline">
              <input type="radio" name="attendance" value="不参加">
              <span class="radio-custom"></span>
              <span class="radio-text">😢 不参加</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="rsvp-message">メッセージ（任意）</label>
          <textarea id="rsvp-message" name="message" rows="3" placeholder="アレルギー情報やコメントなど"></textarea>
        </div>
        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-text">回答を送信</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
      <div class="rsvp-result hidden" id="rsvp-success">
        <div class="result-icon">✅</div>
        <p class="result-text">ご回答ありがとうございます！</p>
        <p class="result-sub">当日お会いできるのを楽しみにしています。</p>
      </div>
      <div class="rsvp-result hidden" id="rsvp-error">
        <div class="result-icon">⚠️</div>
        <p class="result-text">送信に失敗しました</p>
        <p class="result-sub">お手数ですが、幹事に直接ご連絡ください。</p>
        <button class="btn-retry" id="btn-retry">もう一度試す</button>
      </div>
    </div>
  </section>

  <!-- ===== Section 5: Photo Gallery ===== -->
  <section id="gallery-section" class="section gallery-section hidden">
    <div class="card gallery-card animate-in">
      <h2 class="section-title">📸 思い出ギャラリー</h2>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
    <!-- Lightbox -->
    <div class="lightbox hidden" id="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="閉じる">&times;</button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <p class="lightbox-caption" id="lightbox-caption"></p>
      <button class="lightbox-prev" id="lightbox-prev" aria-label="前へ">❮</button>
      <button class="lightbox-next" id="lightbox-next" aria-label="次へ">❯</button>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer hidden" id="footer">
    <p>Organized by <span id="footer-organizer"></span></p>
  </footer>

  <script src="js/app.js"></script>
</body>

</html>
